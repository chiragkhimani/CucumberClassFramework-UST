name: Cucumber CI

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-publish-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Cucumber tests and generate HTML report
        run: mvn -B clean verify

      - name: Prepare report for GitHub Pages
        id: report
        if: always()
        run: |
          REPORT_DIR="CucumberReport/cucumber-html-reports"
          if [ ! -f "$REPORT_DIR/overview-features.html" ]; then
            echo "::warning::Cucumber HTML report was not generated. Skipping Pages deploy."
            echo "report_exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cp "$REPORT_DIR/overview-features.html" "$REPORT_DIR/index.html"
          echo "report_exists=true" >> "$GITHUB_OUTPUT"

      - name: Upload Cucumber report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: |
            target/cucumber.json
            CucumberReport/
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: steps.report.outputs.report_exists == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: CucumberReport/cucumber-html-reports

      - name: Deploy report to GitHub Pages
        if: steps.report.outputs.report_exists == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to job summary
        if: steps.deployment.outputs.page_url != ''
        run: |
          echo "## Cucumber Report" >> "$GITHUB_STEP_SUMMARY"
          echo "View the latest report: [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
